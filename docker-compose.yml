services:
  server:
    build: .
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=${DOCKER_DB_HOST}
      - DB_PORT=${DOCKER_DB_PORT}
      - DB_USER=${DOCKER_PG_USER}
      - DB_PASSWORD=${DOCKER_PG_PASSWORD}
      - DB_NAME=${DOCKER_PG_DB}
  postgres:
    image: postgres:16-alpine
    container_name: postgres_container
    environment:
      POSTGRES_USER: ${DOCKER_PG_USER}
      POSTGRES_PASSWORD: ${DOCKER_PG_PASSWORD}
      POSTGRES_DB: ${DOCKER_PG_DB}
    ports:
      - "${DOCKER_DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_PG_USER} -d ${DOCKER_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata: